<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GameHub - Snake FIX</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    header{
      padding:15px;
      background:#111827;
    }

    button{
      padding:10px 15px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      color:white;
      cursor:pointer;
    }

    canvas{
      background:black;
      display:none;
      margin:20px auto;
    }
  </style>
</head>

<body>

<header>
  <h2>🐍 Snake Game FIX (GitHub Ready)</h2>
</header>

<button onclick="startGame()">Start Game</button>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
let snake, dir, food, loop;

function startGame(){
  canvas.style.display = "block";

  snake = [{x:200,y:200}];
  dir = "right";

  food = spawnFood();

  document.onkeydown = (e)=>{
    if(e.key==="ArrowLeft" && dir!=="right") dir="left";
    if(e.key==="ArrowRight" && dir!=="left") dir="right";
    if(e.key==="ArrowUp" && dir!=="down") dir="up";
    if(e.key==="ArrowDown" && dir!=="up") dir="down";
  };

  clearInterval(loop);
  loop = setInterval(update, 120);
}

function spawnFood(){
  return {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
  };
}

function update(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,400,400);

  // draw food
  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,box,box);

  // draw snake
  ctx.fillStyle="lime";
  for(let i=0;i<snake.length;i++){
    ctx.fillRect(snake[i].x,snake[i].y,box,box);
  }

  let head = {...snake[0]};

  if(dir==="left") head.x -= box;
  if(dir==="right") head.x += box;
  if(dir==="up") head.y -= box;
  if(dir==="down") head.y += box;

  // ❌ hit wall = reset game
  if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400){
    return reset();
  }

  // ❌ hit self = reset
  for(let i=0;i<snake.length;i++){
    if(head.x === snake[i].x && head.y === snake[i].y){
      return reset();
    }
  }

  snake.unshift(head);

  // eat food
  if(head.x === food.x && head.y === food.y){
    food = spawnFood();
  } else {
    snake.pop();
  }
}

function reset(){
  alert("Game Over!");
  startGame();
}
</script>

</body>
</html>
